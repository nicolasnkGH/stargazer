version: "3.9"

services:
  stargazer-api:
    build: ./api
    container_name: stargazer-api
    restart: unless-stopped
    ports:
      - "8181:8181"
    env_file: .env
    volumes:
      - skyfield_data:/app/.skyfield
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  stargazer-web:
    image: nginx:alpine
    container_name: stargazer-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - stargazer-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  skyfield_data:
