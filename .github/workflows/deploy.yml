name: Deploy Stargazer CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit
          if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 api/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Security Check with Bandit
        run: |
          bandit -r api/ -ll -ii -s B104

      - name: Create dummy .env for validation
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose config -q

      - name: Port Conflict / Network Validation
        run: |
          grep "8080:80" docker-compose.yml || (echo "Port 8080 mapping missing" && exit 1)

      - name: Dockerfile Linter (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: validate
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Server
        run: |
          # The runner has checked out the latest code in the current directory.
          # Sync it over to the live directory using tar (since rsync isn't installed)
          mkdir -p /opt/stargazer
          tar -cf - --exclude=.git . | (cd /opt/stargazer && tar -xf -)
          cd /opt/stargazer
          if [ ! -f .env ]; then
            echo "No .env found, initializing from .env.example"
            cp .env.example .env
          else
            echo "Existing .env found, preserving it."
          fi
          docker compose up -d --build

      - name: Health Check Verification
        working-directory: /opt/stargazer
        run: |
          echo "Waiting for API to start..."
          sleep 10
          docker compose exec -T stargazer-api curl -f http://localhost:8181/health || (echo "Health check failed" && docker compose logs && exit 1)
          echo "Deployment successful and healthy!"
